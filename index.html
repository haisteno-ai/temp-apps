<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT Ticket Tracker — Week of March 11</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #151820;
    --surface2: #1c2030;
    --border: #252a3a;
    --accent: #4f9cf9;
    --accent2: #f97b4f;
    --accent3: #4ff9a0;
    --warn: #f9c44f;
    --danger: #f94f6a;
    --text: #e2e8f8;
    --muted: #6b7494;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 0;
  }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }

  .logo-text {
    font-size: 16px;
    font-weight: 800;
    letter-spacing: -0.3px;
  }

  .logo-sub {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    margin-top: 1px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .deadline-badge {
    font-family: var(--mono);
    font-size: 11px;
    background: rgba(249,196,79,0.12);
    border: 1px solid rgba(249,196,79,0.3);
    color: var(--warn);
    padding: 5px 12px;
    border-radius: 20px;
  }

  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
  }

  .progress-bar {
    width: 120px;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent3));
    border-radius: 3px;
    transition: width 0.4s ease;
  }

  /* FILTERS */
  .filters {
    padding: 16px 28px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .filter-btn {
    font-family: var(--mono);
    font-size: 11px;
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* LAYOUT */
  .main {
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 0;
    min-height: calc(100vh - 110px);
  }

  .ticket-list {
    padding: 20px 28px;
    border-right: 1px solid var(--border);
  }

  .sidebar {
    padding: 20px;
    background: var(--surface);
  }

  /* TICKETS */
  .section-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 1.5px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
    margin-top: 4px;
  }

  .ticket {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.15s;
    position: relative;
    overflow: hidden;
  }

  .ticket::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 10px 0 0 10px;
  }

  .ticket.status-open::before { background: var(--accent); }
  .ticket.status-in-progress::before { background: var(--warn); }
  .ticket.status-needs-scheduling::before { background: var(--accent2); }
  .ticket.status-done::before { background: var(--accent3); }

  .ticket:hover { border-color: #3a4060; transform: translateX(2px); }
  .ticket.selected { border-color: var(--accent); background: var(--surface2); }
  .ticket.status-done { opacity: 0.5; }

  .ticket-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 8px;
  }

  .ticket-id {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    font-weight: 600;
    flex-shrink: 0;
  }

  .ticket-title {
    font-size: 14px;
    font-weight: 600;
    line-height: 1.35;
    flex: 1;
  }

  .status-pill {
    font-family: var(--mono);
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .pill-open { background: rgba(79,156,249,0.12); color: var(--accent); }
  .pill-in-progress { background: rgba(249,196,79,0.12); color: var(--warn); }
  .pill-needs-scheduling { background: rgba(249,123,79,0.12); color: var(--accent2); }
  .pill-done { background: rgba(79,249,160,0.12); color: var(--accent3); }

  .ticket-meta {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }

  .tag {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    background: var(--surface2);
    padding: 2px 8px;
    border-radius: 4px;
    border: 1px solid var(--border);
  }

  .tag.tag-person { color: #b794f4; border-color: rgba(183,148,244,0.2); background: rgba(183,148,244,0.06); }
  .tag.tag-location { color: #76e4f7; border-color: rgba(118,228,247,0.2); background: rgba(118,228,247,0.06); }

  /* DETAIL PANEL */
  .detail-panel {
    position: sticky;
    top: 110px;
    max-height: calc(100vh - 130px);
    overflow-y: auto;
  }

  .detail-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 300px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
    gap: 12px;
    text-align: center;
  }

  .detail-empty .icon { font-size: 32px; opacity: 0.3; }

  .detail-card { display: none; }
  .detail-card.active { display: block; }

  .detail-ticket-id {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent);
    margin-bottom: 6px;
  }

  .detail-title {
    font-size: 18px;
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 16px;
  }

  .detail-section {
    margin-bottom: 18px;
  }

  .detail-section-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .detail-desc {
    font-size: 13px;
    line-height: 1.6;
    color: #a0aec0;
  }

  .status-select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 8px 12px;
    border-radius: 6px;
    cursor: pointer;
    margin-bottom: 10px;
  }

  .notes-area {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 10px;
    border-radius: 6px;
    resize: vertical;
    min-height: 80px;
    line-height: 1.5;
  }

  .notes-area:focus, .status-select:focus { outline: none; border-color: var(--accent); }

  .save-btn {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 9px;
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 12px;
    cursor: pointer;
    font-weight: 600;
    transition: opacity 0.15s;
    margin-top: 6px;
  }

  .save-btn:hover { opacity: 0.85; }

  .people-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .person-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
  }

  .person-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #b794f4;
    flex-shrink: 0;
  }

  /* SIDEBAR STATS */
  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 20px;
  }

  .stat-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    text-align: center;
  }

  .stat-num {
    font-family: var(--mono);
    font-size: 24px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 1px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .stat-open .stat-num { color: var(--accent); }
  .stat-sched .stat-num { color: var(--accent2); }
  .stat-prog .stat-num { color: var(--warn); }
  .stat-done .stat-num { color: var(--accent3); }

  /* SCHEDULE SECTION */
  .schedule-item {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    margin-bottom: 10px;
    font-size: 12px;
  }

  .sched-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent2);
    margin-top: 4px;
    flex-shrink: 0;
  }

  .sched-name { font-weight: 600; }
  .sched-tick { font-family: var(--mono); font-size: 10px; color: var(--muted); }

  hr { border: none; border-top: 1px solid var(--border); margin: 18px 0; }

  @media (max-width: 900px) {
    .main { grid-template-columns: 1fr; }
    .sidebar { display: none; }
  }
</style>
</head>

// Load saved state from localStorage
function loadState() {
  try {
    const saved = localStorage.getItem('it_tickets_v1');
    if (saved) {
      const data = JSON.parse(saved);
      data.forEach(s => {
        const t = TICKETS.find(t => t.id === s.id);
        if (t) { t.status = s.status; t.notes = s.notes; }
      });
    }
  } catch(e) {}
}

function saveState() {
  const data = TICKETS.map(t => ({ id: t.id, status: t.status, notes: t.notes }));
  localStorage.setItem('it_tickets_v1', JSON.stringify(data));
}

let currentFilter = 'all';
let selectedId = null;

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function statusLabel(s) {
  const map = { 'open': 'Open', 'in-progress': 'In Progress', 'needs-scheduling': 'Needs Scheduling', 'done': 'Done' };
  return map[s] || s;
}

function pillClass(s) {
  const map = { 'open': 'pill-open', 'in-progress': 'pill-in-progress', 'needs-scheduling': 'pill-needs-scheduling', 'done': 'pill-done' };
  return map[s] || '';
}

function renderList() {
  const list = document.getElementById('ticketList');
  const filtered = currentFilter === 'all' ? TICKETS : TICKETS.filter(t => t.status === currentFilter);

  list.innerHTML = '';

  if (filtered.length === 0) {
    list.innerHTML = '<div style="color:var(--muted);font-family:var(--mono);font-size:12px;padding:40px 0;text-align:center;">No tickets in this category.</div>';
    return;
  }

  filtered.forEach(t => {
    const el = document.createElement('div');
    el.className = `ticket status-${t.status}${selectedId === t.id ? ' selected' : ''}`;
    el.onclick = () => selectTicket(t.id);

    const personTags = t.persons.map(p => `<span class="tag tag-person">👤 ${p}</span>`).join('');
    const locTag = t.location ? `<span class="tag tag-location">📍 ${t.location}</span>` : '';
    const typeTags = t.tags.map(g => `<span class="tag">${g}</span>`).join('');

    el.innerHTML = `
      <div class="ticket-header">
        <div>
          <div class="ticket-id">#${t.id}</div>
          <div class="ticket-title">${t.title}</div>
        </div>
        <span class="status-pill ${pillClass(t.status)}">${statusLabel(t.status)}</span>
      </div>
      <div class="ticket-meta">
        ${personTags}${locTag}${typeTags}
      </div>
    `;
    list.appendChild(el);
  });

  updateStats();
}

function selectTicket(id) {
  selectedId = id;
  const t = TICKETS.find(t => t.id === id);
  renderList();

  const panel = document.getElementById('detailPanel');

  const personRows = t.persons.map(p => `<div class="person-row"><div class="person-dot"></div>${p}</div>`).join('');

  panel.innerHTML = `
    <div class="detail-card active">
      <div class="detail-ticket-id">#${t.id}</div>
      <div class="detail-title">${t.title}</div>

      <div class="detail-section">
        <div class="detail-section-label">Description</div>
        <div class="detail-desc">${t.desc}</div>
      </div>

      ${t.persons.length ? `
      <div class="detail-section">
        <div class="detail-section-label">People Involved</div>
        <div class="people-list">${personRows}</div>
      </div>` : ''}

      ${t.location ? `
      <div class="detail-section">
        <div class="detail-section-label">Location</div>
        <div class="detail-desc">📍 ${t.location}</div>
      </div>` : ''}

      <div class="detail-section">
        <div class="detail-section-label">Status</div>
        <select class="status-select" id="statusSel_${t.id}" onchange="updateStatus('${t.id}')">
          <option value="open" ${t.status==='open'?'selected':''}>Open</option>
          <option value="needs-scheduling" ${t.status==='needs-scheduling'?'selected':''}>Needs Scheduling</option>
          <option value="in-progress" ${t.status==='in-progress'?'selected':''}>In Progress</option>
          <option value="done" ${t.status==='done'?'selected':''}>Done ✓</option>
        </select>
      </div>

      <div class="detail-section">
        <div class="detail-section-label">Notes</div>
        <textarea class="notes-area" id="notes_${t.id}" placeholder="Add notes, time scheduled, steps taken...">${t.notes}</textarea>
        <button class="save-btn" onclick="saveNotes('${t.id}')">Save Notes</button>
      </div>
    </div>
  `;
}

function updateStatus(id) {
  const t = TICKETS.find(t => t.id === id);
  t.status = document.getElementById(`statusSel_${id}`).value;
  saveState();
  renderList();
  updateStats();
  renderScheduleList();
}

function saveNotes(id) {
  const t = TICKETS.find(t => t.id === id);
  t.notes = document.getElementById(`notes_${id}`).value;
  saveState();
  const btn = event.target;
  btn.textContent = 'Saved ✓';
  btn.style.background = 'var(--accent3)';
  btn.style.color = '#0d1a12';
  setTimeout(() => { btn.textContent = 'Save Notes'; btn.style.background = ''; btn.style.color = ''; }, 1500);
}

function updateStats() {
  const counts = { open: 0, 'needs-scheduling': 0, 'in-progress': 0, done: 0 };
  TICKETS.forEach(t => counts[t.status]++);
  document.getElementById('statOpen').textContent = counts['open'];
  document.getElementById('statSched').textContent = counts['needs-scheduling'];
  document.getElementById('statProg').textContent = counts['in-progress'];
  document.getElementById('statDone').textContent = counts['done'];

  const done = counts['done'];
  const total = TICKETS.length;
  const pct = Math.round((done / total) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${done}/${total}`;
}

function renderScheduleList() {
  const sched = TICKETS.filter(t => t.needsScheduling && t.status !== 'done');
  const el = document.getElementById('schedList');
  if (sched.length === 0) {
    el.innerHTML = '<div style="color:var(--accent3);font-family:var(--mono);font-size:11px;">All scheduling done! 🎉</div>';
    return;
  }
  el.innerHTML = sched.map(t => `
    <div class="schedule-item" onclick="selectTicket('${t.id}')" style="cursor:pointer">
      <div class="sched-dot"></div>
      <div>
        <div class="sched-name">${t.persons[0] || 'TBD'}</div>
        <div class="sched-tick">#${t.id}</div>
      </div>
    </div>
  `).join('');
}

// Init
loadState();
renderList();
updateStats();
renderScheduleList();
</script>
</body>
</html>
